<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابطي الشخصية 🔗</title>
    <style>
        /* تصميم الخلفية والخطوط */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* صورة الملف الشخصي */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00d2ff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* حاوية الروابط */
        .links-container {
            width: 100%;
            max-width: 400px;
        }

        /* تصميم الزر */
        .link-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: block;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* تأثيرات التحويم (Hover) */
        .link-card:hover {
            background: #00d2ff;
            color: #1e1e2f;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        /* ألوان مخصصة لكل منصة (اختياري) */
        .insta:hover { background: #E1306C; color: white; }
        .yt:hover { background: #FF0000; color: white; }
        .tt:hover { background: #000000; color: white; }
        .threads:hover { background: #ffffff; color: #000; }

    </style>
</head>
<body>

    <img src="10920.jpg" alt="Profile Picture" class="profile-img">

    <h1>    welcoom 🤺🔥</h1>
    <p>تابعني على منصات التواصل الاجتماعي</p>

    <div class="links-container">
        <a href="https://instagram.com/m.rf0.9" target="_blank" class="link-card insta">
            Instagram 📸
        </a>

        <a href="https://youtube.com/@mrf_01_00?si=xHg8pvdK-l9NE8-C" target="_blank" class="link-card yt">
            YouTube 🎥
        </a>

        <a href="https://www.tiktok.com/@marwan_mrf_22?_r=1&_t=ZS-94SP86RkbtR" target="_blank" class="link-card tt">
            TikTok 🎵
        </a>

        <a href="https://threads.net/@marwan_mrf_22" target="_blank" class="link-card threads">
            Threads 🧵
        </a>
    </div>

    <footer style="margin-top: 50px; font-size: 0.8rem; opacity: 0.6;">
        by m_•eroufel
    </footer>

</body>
</html>
